services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${VITAC_TASK_IMAGE_NAME:-vitac-debug-database-query}
    container_name: ${VITAC_TASK_CONTAINER_NAME:-vitac-debug-database-query}
    command: ["sh", "-c", "sleep infinity"]
    environment:
      - TEST_DIR=${VITAC_TEST_DIR:-/tests}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    ports:
      - "${VITAC_OPENCODE_PORT:-0}:4096"
    volumes:
      - ${VITAC_TASK_LOGS_PATH:-/tmp/vitac-logs}:${VITAC_CONTAINER_LOGS_PATH:-/logs}
