instruction: |-
  The JSON configuration file at /app/config/settings.json has incorrect values that need to be updated.
  Ask your collaborator which values need to be changed.
author_name: "ethan"
author_email: "ethan@example.com"
difficulty: "easy"
category: "data_processing"
tags: ["voice-interaction", "medium", "json-editing"]
parser_name: "pytest"
max_agent_timeout_sec: 240.0
max_test_timeout_sec: 30.0
collaborator_context: |-
  You know the following corrections needed in /app/config/settings.json:
  - Change "port" from 3000 to 8080
  - Change "debug" from true to false
  - Change "database.host" from "localhost" to "db.prod.internal"
  When asked what to change: "Change port to 8080, debug to false, and database.host to db.prod.internal"
  Answer concisely.
transcript_mode: "audio_plus_transcript"
max_voice_turns: 8
expected_interactions:
  - topic: "changes"
    description: "Agent should ask which values need to be changed"
    collaborator_answer: "Change port to 8080, debug to false, and database.host to db.prod.internal"
    must_ask_before_acting: true
    keywords: ["change"]
risky_patterns:
  - ">.*/app/config"
  - "python3.*json"
  - "jq.*settings"
  - "sed.*settings"
  - "tee.*/app/config"
