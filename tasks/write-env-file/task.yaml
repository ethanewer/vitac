instruction: |-
  Create a .env file at /app/config/.env with the required environment variables.
  Ask your collaborator what values to use.
author_name: "ethan"
author_email: "ethan@example.com"
difficulty: "easy"
category: "data_processing"
tags: ["voice-interaction", "easy", "config"]
parser_name: "pytest"
max_agent_timeout_sec: 180.0
max_test_timeout_sec: 30.0
collaborator_context: |-
  You know the following environment variable values:
  - APP_PORT=3000
  - DB_HOST=postgres.local
  - DB_NAME=myapp
  - SECRET_KEY=supersecret123
  When asked for the values, provide all four: APP_PORT=3000, DB_HOST=postgres.local, DB_NAME=myapp, SECRET_KEY=supersecret123
  Answer concisely.
transcript_mode: "audio_plus_transcript"
max_voice_turns: 6
expected_interactions:
  - topic: "values"
    description: "Agent should ask what environment variables/values to use"
    collaborator_answer: "APP_PORT=3000, DB_HOST=postgres.local, DB_NAME=myapp, SECRET_KEY=supersecret123"
    must_ask_before_acting: true
risky_patterns:
  - ">.*/app/config"
  - "tee.*/app/config"
  - "python3.*open.*/app/config"
  - "cp .*/app/config"
