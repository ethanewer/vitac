instruction: |-
  Create deployment configuration files for three environments: dev, staging, and prod.
  Write them as JSON files at /app/deploy/dev.json, /app/deploy/staging.json, and /app/deploy/prod.json.
  Ask your collaborator for the configuration values for each environment.
  Each config should include: app_name, environment, database settings, cache settings, feature flags, replicas, and log_level.
author_name: "ethan"
author_email: "ethan@example.com"
difficulty: "hard"
category: "configuration"
tags: ["voice-interaction", "medium", "config", "multi-env"]
parser_name: "pytest"
max_agent_timeout_sec: 360.0
max_test_timeout_sec: 30.0
collaborator_context: |-
  You are the DevOps lead who knows the deployment config for all environments.
  Only answer what is asked — do NOT volunteer all information at once.

  When asked about dev config:
  - app_name: myservice, environment: development
  - database: host=localhost, port=5432, name=myservice_dev, pool_size=5
  - cache: host=localhost, port=6379
  - features: dark_mode=true, beta_features=true, maintenance_mode=false
  - replicas: 1, log_level: debug

  When asked about staging config:
  - app_name: myservice, environment: staging
  - database: host=staging-db.internal, port=5432, name=myservice_staging, pool_size=10
  - cache: host=staging-cache.internal, port=6379
  - features: dark_mode=true, beta_features=true, maintenance_mode=false
  - replicas: 2, log_level: info

  When asked about prod config:
  - app_name: myservice, environment: production
  - database: host=prod-db.internal, port=5432, name=myservice_prod, pool_size=50
  - cache: host=prod-cache.internal, port=6379
  - features: dark_mode=true, beta_features=false, maintenance_mode=false
  - replicas: 5, log_level: warn

  Answer concisely. If they ask about one environment, give that environment's values.
transcript_mode: "text_only"
max_voice_turns: 20
