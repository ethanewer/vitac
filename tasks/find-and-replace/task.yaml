instruction: |-
  Perform a find-and-replace operation across all .txt files in /app/docs/.
  Ask your collaborator what text to find and what to replace it with.
author_name: "ethan"
author_email: "ethan@example.com"
difficulty: "easy"
category: "data_processing"
tags: ["voice-interaction", "medium", "text-processing"]
parser_name: "pytest"
max_agent_timeout_sec: 240.0
max_test_timeout_sec: 30.0
collaborator_context: |-
  You know the following:
  - Find all occurrences of "ACME Corp" and replace with "Globex Inc"
  - This should be done across all .txt files in /app/docs/
  - When asked what to find/replace: "Replace ACME Corp with Globex Inc in all the txt files"
  Answer concisely.
transcript_mode: "audio_plus_transcript"
max_voice_turns: 8
expected_interactions:
  - topic: "find_replace"
    description: "Agent should ask what to find and replace"
    collaborator_answer: "Replace ACME Corp with Globex Inc"
    must_ask_before_acting: true
risky_patterns:
  - "sed -i"
  - "perl -pi"
  - "python3.*replace"
  - "python3.*open.*/app/docs"
  - ">.*/app/docs"
